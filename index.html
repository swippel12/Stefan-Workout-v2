<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">

<title>12-Month Training</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700&amp;family=Barlow+Condensed:wght@400;500;600;700&amp;display=swap" rel="stylesheet">
<noscript><style>body{display:flex;align-items:center;justify-content:center;height:100vh;color:#fff;font-family:sans-serif;text-align:center}body::after{content:'JavaScript is required to run this app.'}</style></noscript>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:#0a0a0a;color:#f0f0f0;font-family:'Barlow',sans-serif}
#app{height:100%;display:flex;flex-direction:column;padding-top:44px;padding-bottom:24px}
.screen{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;display:none;padding:16px 16px 80px}
.screen.active{display:block}
.nav{position:fixed;bottom:0;left:0;right:0;background:#141414;border-top:1px solid #2a2a2a;display:flex;padding-bottom:24px;z-index:100}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;padding:10px 0 4px;background:none;border:none;color:#555;font-family:'Barlow Condensed',sans-serif;font-size:10px;letter-spacing:1px;text-transform:uppercase;cursor:pointer;-webkit-tap-highlight-color:transparent}
.nav-btn.active{color:#e8ff00}
.nav-btn svg{width:20px;height:20px;margin-bottom:3px;fill:currentColor}
.tag{font-family:'Barlow Condensed',sans-serif;font-size:11px;letter-spacing:2px;text-transform:uppercase;color:#888}
.title{font-family:'Barlow Condensed',sans-serif;font-size:28px;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin:4px 0 16px}
.subtitle{font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:600;text-transform:uppercase;letter-spacing:1px}
.label{font-family:'Barlow Condensed',sans-serif;font-size:12px;letter-spacing:1.5px;text-transform:uppercase;color:#888}
.card{background:#141414;border-radius:12px;padding:16px;margin-bottom:12px;border:1px solid #2a2a2a}
.prog-bar{height:4px;background:#1e1e1e;border-radius:2px;overflow:hidden;margin:6px 0}
.prog-fill{height:100%;border-radius:2px;transition:width .3s}
.btn{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:600;letter-spacing:1px;text-transform:uppercase;border:none;border-radius:8px;padding:12px 20px;cursor:pointer;display:inline-flex;align-items:center;gap:6px;-webkit-tap-highlight-color:transparent}
.btn-primary{background:#e8ff00;color:#0a0a0a}
.btn-secondary{background:#1e1e1e;color:#f0f0f0;border:1px solid #2a2a2a}
.btn-green{background:#44ff88;color:#0a0a0a}
.btn-red{background:rgba(255,68,68,.15);color:#ff4444;border:1px solid rgba(255,68,68,.3)}
.btn-full{width:100%;justify-content:center}
.input{background:#1e1e1e;border:1px solid #2a2a2a;border-radius:8px;color:#f0f0f0;font-family:'Barlow',sans-serif;font-size:16px;padding:10px 12px;width:100%;outline:none}
.input:focus{border-color:#e8ff00}
select.input{-webkit-appearance:none;appearance:none}
.overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:#0a0a0a;z-index:200;display:none;flex-direction:column;padding-top:44px}
.overlay.active{display:flex}
.overlay-header{display:flex;align-items:center;padding:16px;gap:12px;border-bottom:1px solid #2a2a2a;flex-shrink:0}
.overlay-body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:16px}
.back-btn{background:none;border:none;color:#f0f0f0;font-size:20px;cursor:pointer;padding:4px 8px;-webkit-tap-highlight-color:transparent}
.phase-block{margin-bottom:24px}
.phase-header{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.phase-dot{width:8px;height:8px;border-radius:50%}
.phase-label{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:600;letter-spacing:2px;text-transform:uppercase}
.month-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.month-card{background:#141414;border-radius:12px;padding:14px;border:1px solid #2a2a2a;cursor:pointer;transition:transform .15s;-webkit-tap-highlight-color:transparent}
.month-card:active{transform:scale(.97)}
.month-card.current{box-shadow:0 0 20px rgba(232,255,0,.12)}
.month-card .m-num{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:600;text-transform:uppercase;letter-spacing:1px}
.month-card .m-name{font-family:'Barlow Condensed',sans-serif;font-size:11px;color:#888;text-transform:uppercase;letter-spacing:1px;margin-top:2px}
.month-card .m-cal{font-family:'Barlow Condensed',sans-serif;font-size:10px;color:#555;margin-top:1px}
.month-card .m-status{font-family:'Barlow Condensed',sans-serif;font-size:10px;margin-top:8px;color:#888}
.current-badge{font-family:'Barlow Condensed',sans-serif;font-size:9px;letter-spacing:1.5px;padding:2px 6px;border-radius:4px;text-transform:uppercase;display:inline-block;margin-bottom:6px}
.week-block{background:#141414;border-radius:10px;margin-bottom:8px;border:1px solid #2a2a2a;overflow:hidden}
.week-header{padding:14px 16px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;-webkit-tap-highlight-color:transparent}
.wh-left{display:flex;flex-direction:column;gap:2px}
.wh-title{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:600;text-transform:uppercase;letter-spacing:1px}
.wh-dates{font-family:'Barlow Condensed',sans-serif;font-size:11px;color:#888}
.wh-arrow{color:#555;transition:transform .2s;font-size:14px}
.week-header.open .wh-arrow{transform:rotate(180deg)}
.week-body{display:none;padding:0 16px 16px}
.week-body.open{display:block}
.deload-banner{background:rgba(255,140,0,.1);border:1px solid rgba(255,140,0,.3);border-radius:8px;padding:10px 14px;margin-bottom:12px;font-family:'Barlow Condensed',sans-serif;font-size:12px;color:#ff8c00;letter-spacing:1px;text-transform:uppercase}
.day-tabs{display:flex;gap:6px;margin-bottom:12px}
.day-tab{flex:1;padding:8px;text-align:center;background:#1e1e1e;border-radius:6px;font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:1px;cursor:pointer;color:#888;border:1px solid transparent;-webkit-tap-highlight-color:transparent}
.day-tab.active{color:#f0f0f0;border-color:#2a2a2a}
.day-tab.bonus{font-size:10px}
.ex-plan{padding:10px 0;border-bottom:1px solid #1e1e1e}
.ex-plan:last-child{border-bottom:none}
.ep-name{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:600}
.ep-specs{font-family:'Barlow Condensed',sans-serif;font-size:11px;color:#888;margin-top:2px}
.ep-note{font-size:12px;color:#666;margin-top:4px;font-style:italic}
.superset-tag{font-family:'Barlow Condensed',sans-serif;font-size:9px;color:#00d4ff;letter-spacing:1.5px;text-transform:uppercase;margin-right:4px}
.week-pips{display:flex;gap:8px;margin:12px 0}
.pip{width:28px;height:4px;border-radius:2px;background:#282828}
.pip.done{background:#44ff88}
.pip.current{background:#e8ff00}
.day-card{background:#141414;border-radius:12px;padding:16px;margin-bottom:10px;border:1px solid #2a2a2a;cursor:pointer;display:flex;justify-content:space-between;align-items:center;-webkit-tap-highlight-color:transparent}
.day-card:active{transform:scale(.98)}
.day-card.completed{opacity:.8}
.dc-left{display:flex;align-items:center;gap:12px}
.dc-letter{font-family:'Barlow Condensed',sans-serif;font-size:24px;font-weight:700;width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;background:#1e1e1e}
.dc-info{display:flex;flex-direction:column}
.dc-title{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.dc-sub{font-family:'Barlow Condensed',sans-serif;font-size:11px;color:#888}
.dc-right{text-align:right}
.dc-status{font-family:'Barlow Condensed',sans-serif;font-size:11px;letter-spacing:1px;text-transform:uppercase}
.undo-btn{font-family:'Barlow Condensed',sans-serif;font-size:10px;background:rgba(255,68,68,.1);color:#ff4444;border:1px solid rgba(255,68,68,.3);border-radius:4px;padding:3px 8px;cursor:pointer;letter-spacing:1px;text-transform:uppercase;margin-top:4px;-webkit-tap-highlight-color:transparent}
.wo-progress{height:3px;background:#1e1e1e;border-radius:2px;margin:12px 0}
.wo-progress .fill{height:100%;background:#e8ff00;border-radius:2px;transition:width .3s}
.ex-block{background:#141414;border-radius:12px;padding:16px;margin-bottom:12px;border:1px solid #2a2a2a}
.ex-block.superset{border-left:3px solid #00d4ff}
.ex-name{font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;cursor:pointer;color:#f0f0f0;text-decoration:underline;text-decoration-color:#2a2a2a;text-underline-offset:3px;-webkit-tap-highlight-color:transparent}
.ex-name:active{color:#e8ff00}
.ex-specs{font-family:'Barlow Condensed',sans-serif;font-size:12px;color:#888;margin-top:4px;letter-spacing:.5px}
.ex-coaching{background:#1e1e1e;border-radius:6px;padding:10px 12px;margin-top:8px;font-size:12px;color:#888;line-height:1.4}
.ex-hint{font-family:'Barlow Condensed',sans-serif;font-size:11px;color:#555;margin-top:6px}
.set-row{display:flex;align-items:center;gap:8px;margin-top:8px;padding:6px 0}
.set-num{font-family:'Barlow Condensed',sans-serif;font-size:12px;color:#555;width:20px;text-align:center}
.set-weight{width:70px}
.set-weight input{width:100%;background:#1e1e1e;border:1px solid #2a2a2a;border-radius:6px;color:#f0f0f0;font-family:'Barlow Condensed',sans-serif;font-size:16px;padding:8px;text-align:center;outline:none}
.set-weight input:focus{border-color:#e8ff00}
.set-rpe select{width:60px;background:#1e1e1e;border:1px solid #2a2a2a;border-radius:6px;color:#f0f0f0;font-family:'Barlow Condensed',sans-serif;font-size:14px;padding:8px 4px;outline:none;-webkit-appearance:none}
.set-check{width:36px;height:36px;border-radius:8px;border:2px solid #2a2a2a;background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:transparent;font-size:16px;flex-shrink:0;-webkit-tap-highlight-color:transparent}
.set-check.done{background:#44ff88;border-color:#44ff88;color:#0a0a0a}
.lbs-label{font-family:'Barlow Condensed',sans-serif;font-size:10px;color:#555;letter-spacing:1px;text-align:center}
.row-tracker{background:#141414;border-radius:12px;padding:16px;margin-bottom:12px;border:1px solid #2a2a2a;border-left:3px solid #00d4ff}
.row-time{font-family:'Barlow Condensed',sans-serif;font-size:48px;font-weight:700;text-align:center;margin:16px 0;letter-spacing:2px}
.row-btns{display:flex;gap:8px;justify-content:center;margin-bottom:12px}
.row-stats{display:flex;justify-content:space-around;padding-top:12px;border-top:1px solid #2a2a2a}
.completion{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:#0a0a0a;z-index:300;flex-direction:column;align-items:center;justify-content:center;padding:24px;text-align:center}
.completion.active{display:flex}
.big-check{width:80px;height:80px;border-radius:50%;background:#44ff88;display:flex;align-items:center;justify-content:center;font-size:36px;margin-bottom:24px}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;width:100%;max-width:300px;margin:24px 0}
.stat-card{background:#141414;border-radius:10px;padding:14px;text-align:center}
.stat-card .sv{font-family:'Barlow Condensed',sans-serif;font-size:28px;font-weight:700}
.stat-card .sl{font-family:'Barlow Condensed',sans-serif;font-size:10px;color:#888;letter-spacing:1.5px;text-transform:uppercase;margin-top:4px}
.hist-card{background:#141414;border-radius:12px;padding:14px;margin-bottom:10px;border:1px solid #2a2a2a;cursor:pointer;-webkit-tap-highlight-color:transparent}
.hist-card:active{transform:scale(.98)}
.hc-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.hc-day{font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:700}
.hc-date{font-family:'Barlow Condensed',sans-serif;font-size:12px;color:#888}
.hc-ex{font-size:12px;color:#888;margin-top:2px}
.weight-form{display:flex;gap:8px;margin-bottom:16px;align-items:flex-end}
.wf-field{flex:1;display:flex;flex-direction:column;gap:4px}
.weight-chart-wrap{background:#141414;border-radius:12px;padding:16px;margin-bottom:16px;border:1px solid #2a2a2a}
.weight-chart-wrap canvas{width:100%;height:200px}
.weight-stats{display:flex;justify-content:space-around;margin-bottom:16px}
.weight-log-item{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid #1e1e1e}
.setting-item{background:#141414;border-radius:12px;padding:16px;margin-bottom:10px;border:1px solid #2a2a2a}
.bench-table{width:100%;border-collapse:separate;border-spacing:0}
.bench-table th{font-family:'Barlow Condensed',sans-serif;font-size:11px;letter-spacing:1px;text-transform:uppercase;color:#888;padding:8px 4px;text-align:center;border-bottom:1px solid #2a2a2a}
.bench-table td{padding:6px 4px;text-align:center;border-bottom:1px solid #1e1e1e}
.bench-table td:first-child{text-align:left;font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:600}
.bench-table input{width:52px;background:#1e1e1e;border:1px solid #2a2a2a;border-radius:4px;color:#f0f0f0;font-family:'Barlow Condensed',sans-serif;font-size:14px;padding:6px;text-align:center;outline:none}
.bench-delta{font-family:'Barlow Condensed',sans-serif;font-size:10px}
.exh-entry{padding:12px 0;border-bottom:1px solid #1e1e1e}
.exh-date{font-family:'Barlow Condensed',sans-serif;font-size:13px;color:#888;margin-bottom:4px}
.exh-sets{font-size:12px;color:#f0f0f0}
.exh-pr{font-family:'Barlow Condensed',sans-serif;font-size:11px;color:#e8ff00;letter-spacing:1px;text-transform:uppercase;margin-left:6px}
.lib-category{margin-bottom:16px}
.lib-cat-title{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:#888;padding:8px 0;border-bottom:1px solid #1e1e1e}
.lib-item{padding:12px 0;border-bottom:1px solid #1e1e1e;cursor:pointer;font-family:'Barlow',sans-serif;font-size:14px;-webkit-tap-highlight-color:transparent}
.lib-item:active{color:#e8ff00}
.lib-search{position:sticky;top:0;background:#0a0a0a;padding:8px 0 12px;z-index:5}
.config-modal{background:#141414;border-radius:12px;padding:20px;border:1px solid #2a2a2a}
.config-fields{display:flex;flex-direction:column;gap:12px;margin:16px 0}
.config-field{display:flex;flex-direction:column;gap:4px}
.row-hist-item{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid #1e1e1e}
.rh-time{font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:600}
.rh-date{font-family:'Barlow Condensed',sans-serif;font-size:12px;color:#888}
.rh-pr{font-family:'Barlow Condensed',sans-serif;font-size:10px;color:#e8ff00;letter-spacing:1px}
.completed-bar{background:#1e1e1e;border-radius:8px;padding:10px 14px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center}
.cb-date{font-family:'Barlow Condensed',sans-serif;font-size:13px;color:#44ff88;letter-spacing:.5px}
.cb-edit{font-family:'Barlow Condensed',sans-serif;font-size:11px;color:#e8ff00;background:none;border:1px solid rgba(232,255,0,.3);border-radius:4px;padding:4px 10px;cursor:pointer;letter-spacing:1px;text-transform:uppercase;-webkit-tap-highlight-color:transparent}
.screen::-webkit-scrollbar,.overlay-body::-webkit-scrollbar{width:0}
</style>
</head>

<script>
// ==================== PLAN DATA ====================
var PLAN={phases:[
{name:'HYPERTROPHY',color:'#e8ff00',num:1,range:'1-4',desc:'Build the muscle base',months:[
{num:1,name:'Foundation',weeks:[
{focus:'Orientation',notes:'Learn weights, log everything'},
{focus:'Technique lock-in',notes:'Form first, load second'},
{focus:'Progressive load',notes:'Add 2.5-5kg where solid'},
{focus:'Consolidate',notes:'Deload — lighter sets'}
],days:{
A:{title:'Full Body (Primary)',exercises:[
{name:'Back Squat',sets:4,reps:'6-8',rest:'2 min',note:'Drive knees out, stay tall, brace hard',superset:false},
{name:'Romanian Deadlift',sets:3,reps:'10',rest:'90s',note:'Hip hinge dominant — feel the hamstrings',superset:false},
{name:'Push Press',sets:4,reps:'6-8',rest:'90s',note:'Dip, drive, press — use the legs',superset:false},
{name:'Bent-Over Barbell Row',sets:3,reps:'10',rest:'90s',note:'Chest to bar, elbows drive back',superset:false},
{name:"Farmer's Carry",sets:3,reps:'30m',rest:'60s',note:'Shoulders packed, core rigid, walk tall',superset:true},
{name:'Dead Bug',sets:3,reps:'8/side',rest:'60s',note:'Low back glued to floor throughout',superset:false}
]},
B:{title:'Full Body (Primary)',exercises:[
{name:'Trap Bar Deadlift',sets:4,reps:'6-8',rest:'2 min',note:'Full hip extension lockout at top',superset:false},
{name:'Bulgarian Split Squat',sets:3,reps:'8/side',rest:'90s',note:'Front shin vertical, drive through heel',superset:false},
{name:'Dumbbell Bench Press',sets:3,reps:'10',rest:'90s',note:'Full ROM — touch chest, lock out top',superset:false},
{name:'Prone Dumbbell Row',sets:3,reps:'10',rest:'90s',note:'Chest on bench, row to hip',superset:true},
{name:'Overhead Press (strict)',sets:3,reps:'8',rest:'90s',note:'No leg drive — pure shoulder strength',superset:false},
{name:'Plank + Hip Tap',sets:3,reps:'30s',rest:'60s',note:'Hips stay square — resist rotation',superset:false}

// ==================== DATE UTILITIES ====================
function parseDate(s){var p=s.split(’-’);return new Date(parseInt(p[0]),parseInt(p[1])-1,parseInt(p[2]));}
function formatDate(d){return d.getFullYear()+’-’+(‘0’+(d.getMonth()+1)).slice(-2)+’-’+(‘0’+d.getDate()).slice(-2);}
function addDays(d,n){var r=new Date(d.getTime());r.setDate(r.getDate()+n);return r;}
function getMonthStart(m){return addDays(parseDate(state.startDate),(m-1)*28);}
function getWeekStart(m,w){return addDays(getMonthStart(m),(w-1)*7);}
var MONTHS_SHORT=[‘Jan’,‘Feb’,‘Mar’,‘Apr’,‘May’,‘Jun’,‘Jul’,‘Aug’,‘Sep’,‘Oct’,‘Nov’,‘Dec’];
function getCalendarLabel(d){return MONTHS_SHORT[d.getMonth()]+’ ‘+d.getFullYear();}
function getWeekDateRange(m,w){var ws=getWeekStart(m,w),we=addDays(ws,6);return MONTHS_SHORT[ws.getMonth()]+’ ‘+ws.getDate()+’ – ‘+MONTHS_SHORT[we.getMonth()]+’ ‘+we.getDate();}
function getCurrentMonthNum(){var now=new Date(),start=parseDate(state.startDate),diff=Math.floor((now-start)/(864e5));if(diff<0)return 1;return Math.min(Math.floor(diff/28)+1,12);}
function getCurrentWeekNum(){var now=new Date(),ms=getMonthStart(getCurrentMonthNum()),diff=Math.floor((now-ms)/(864e5));if(diff<0)return 1;return Math.min(Math.floor(diff/7)+1,4);}
function getOverallWeek(){var now=new Date(),start=parseDate(state.startDate),diff=Math.floor((now-start)/(864e5));if(diff<0)return 1;return Math.min(Math.floor(diff/7)+1,48);}
function getPhaseForMonth(m){if(m<=4)return PLAN.phases[0];if(m<=8)return PLAN.phases[1];return PLAN.phases[2];}
function getMonthData(m){var ph=getPhaseForMonth(m);for(var i=0;i<ph.months.length;i++){if(ph.months[i].num===m)return ph.months[i];}return null;}
function formatDateShort(s){var d=parseDate(s);return MONTHS_SHORT[d.getMonth()]+’ ‘+d.getDate();}
function formatTime(secs){return Math.floor(secs/60)+’:’+(‘0’+(secs%60)).slice(-2);}
function getMonthCompletionCount(m){var c=0;for(var w=1;w<=4;w++){[‘A’,‘B’,‘C’].forEach(function(d){if(state.completedDays[m+’*’+w+’*’+d])c++;});}return c;}

var activeWorkout=null,rowTimerInterval=null,rowTimerRunning=false,rowTimerSeconds=0;

function startWorkout(mn,wn,day){
var month=getMonthData(mn),dd=month.days[day];
activeWorkout={monthNum:mn,weekNum:wn,day:day,exercises:[],addedExercises:[],reviewMode:false,editMode:false};
dd.exercises.forEach(function(ex){var ns=typeof ex.sets===‘number’?ex.sets:3,sd=[];for(var i=0;i<ns;i++)sd.push({weight:’’,rpe:’’,done:false});activeWorkout.exercises.push({name:ex.name,sets:ns,reps:ex.reps,rest:ex.rest,note:ex.note,superset:ex.superset,setData:sd,lastWeight:null});});
loadWeightHints();renderWorkout();document.getElementById(‘workout-overlay’).classList.add(‘active’);
}

function reviewWorkout(mn,wn,day){
var cdK=mn+’*’+wn+’*’+day,comp=state.completedDays[cdK];if(!comp)return;
var month=getMonthData(mn),dd=month.days[day];
activeWorkout={monthNum:mn,weekNum:wn,day:day,exercises:[],addedExercises:[],reviewMode:true,editMode:false,completionDate:comp.date,logKey:comp.logKey};
dd.exercises.forEach(function(ex){var ns=typeof ex.sets===‘number’?ex.sets:3,sd=[];for(var i=0;i<ns;i++)sd.push({weight:’’,rpe:’’,done:false});activeWorkout.exercises.push({name:ex.name,sets:ns,reps:ex.reps,rest:ex.rest,note:ex.note,superset:ex.superset,setData:sd,lastWeight:null});});
if(comp.logKey&&state.log[comp.logKey]){var ld=state.log[comp.logKey];activeWorkout.exercises.forEach(function(ex){if(ld[ex.name]){ex.setData=ld[ex.name];ex.sets=ex.setData.length;}});if(ld._added)activeWorkout.addedExercises=ld._added;}
renderWorkout();document.getElementById(‘workout-overlay’).classList.add(‘active’);
}

function loadWeightHints(){activeWorkout.exercises.forEach(function(ex){var lw=null;var keys=Object.keys(state.log);for(var i=keys.length-1;i>=0;i–){var e=state.log[keys[i]];if(e[ex.name]){var sets=e[ex.name];for(var j=sets.length-1;j>=0;j–){if(sets[j].weight){lw=sets[j].weight;break;}}if(lw)break;}}ex.lastWeight=lw;});}

function renderWorkout(){
var wo=activeWorkout,month=getMonthData(wo.monthNum),phase=getPhaseForMonth(wo.monthNum),dd=month.days[wo.day],ov=document.getElementById(‘workout-overlay’);
var totalS=0,doneS=0;
wo.exercises.forEach(function(ex){ex.setData.forEach(function(s){totalS++;if(s.done)doneS++;});});

function updateSet(ei,si,field,val){var all=activeWorkout.exercises.concat(activeWorkout.addedExercises);if(all[ei])all[ei].setData[si][field]=val;}
function toggleSet(ei,si){var all=activeWorkout.exercises.concat(activeWorkout.addedExercises);if(all[ei]){all[ei].setData[si].done=!all[ei].setData[si].done;renderWorkout();}}
function enableEditMode(){activeWorkout.editMode=true;renderWorkout();}
function saveEditedWorkout(){var wo=activeWorkout;if(wo.logKey&&state.log[wo.logKey]){var ld={};wo.exercises.forEach(function(ex){ld[ex.name]=ex.setData;});if(wo.addedExercises.length>0)ld._added=wo.addedExercises;state.log[wo.logKey]=ld;saveState();}wo.editMode=false;renderWorkout();}

function finishWorkout(){
var wo=activeWorkout,today=formatDate(new Date()),logKey=today+’*’+wo.day;
var ld={};wo.exercises.forEach(function(ex){ld[ex.name]=ex.setData;});if(wo.addedExercises.length>0)ld.*added=wo.addedExercises;
state.log[logKey]=ld;state.completedDays[wo.monthNum+’*’+wo.weekNum+’*’+wo.day]={date:today,logKey:logKey};
if(rowTimerSeconds>0&&!rowTimerRunning)state.rowTimes.push({date:today,seconds:rowTimerSeconds});
saveState();stopRowTimer();rowTimerSeconds=0;showCompletion(wo);
}

function showCompletion(wo){
var exC=wo.exercises.length+wo.addedExercises.length,setC=0,tW=0,wC=0;
wo.exercises.concat(wo.addedExercises).forEach(function(ex){ex.setData.forEach(function(s){if(s.done){setC++;if(s.weight&&parseFloat(s.weight)>0){tW+=parseFloat(s.weight);wC++;}}});});

h+=’<div class="stat-card" style="'+(rowTimerSeconds>0?'border:1px solid rgba(0,212,255,.3)':'')+'"><div class="sv" style="'+(rowTimerSeconds>0?'color:#00d4ff':'')+'">’+( rowTimerSeconds>0?formatTime(rowTimerSeconds):’—’)+’</div><div class="sl">ROW TIME</div></div>’;

if(!w||!d)return;
state.weightLog.push({date:d,weight:w});
state.weightLog.sort(function(a,b){return a.date>b.date?1:a.date<b.date?-1:0;});
saveState();renderWeight();
}
function deleteWeight(date,weight){
state.weightLog=state.weightLog.filter(function(e){return !(e.date===date&&e.weight===weight);});
saveState();renderWeight();
}
function drawWeightChart(){
var canvas=document.getElementById(‘wt-canvas’);if(!canvas)return;
var ctx=canvas.getContext(‘2d’),wl=state.weightLog;
canvas.width=canvas.offsetWidth*2;canvas.height=400;
ctx.clearRect(0,0,canvas.width,canvas.height);
if(wl.length<2){ctx.fillStyle=’#555’;ctx.font=‘24px Barlow Condensed’;ctx.textAlign=‘center’;ctx.fillText(‘Log 2+ entries to see chart’,canvas.width/2,200);return;}
var pad=40,w=canvas.width-pad*2,ht=canvas.height-pad*2;
var vals=wl.map(function(e){return e.weight;}),mn=Math.min.apply(null,vals)-2,mx=Math.max.apply(null,vals)+2;
if(mn===mx)mx=mn+4;
ctx.strokeStyle=’#2a2a2a’;ctx.lineWidth=1;
for(var i=0;i<5;i++){var y=pad+ht*(i/4);ctx.beginPath();ctx.moveTo(pad,y);ctx.lineTo(pad+w,y);ctx.stroke();
ctx.fillStyle=’#555’;ctx.font=‘20px Barlow Condensed’;ctx.textAlign=‘right’;ctx.fillText(Math.round(mx-(mx-mn)*(i/4)),pad-8,y+6);}
var pts=[];
wl.forEach(function(e,i){var x=pad+(i/(wl.length-1))*w,y=pad+ht*(1-(e.weight-mn)/(mx-mn));pts.push({x:x,y:y});});
// Gradient fill
var grad=ctx.createLinearGradient(0,pad,0,pad+ht);
grad.addColorStop(0,‘rgba(68,255,136,.3)’);grad.addColorStop(1,‘rgba(68,255,136,0)’);
ctx.beginPath();ctx.moveTo(pts[0].x,pad+ht);
pts.forEach(function(p){ctx.lineTo(p.x,p.y);});
ctx.lineTo(pts[pts.length-1].x,pad+ht);ctx.closePath();ctx.fillStyle=grad;ctx.fill();
// Line
ctx.beginPath();ctx.moveTo(pts[0].x,pts[0].y);
pts.forEach(function(p){ctx.lineTo(p.x,p.y);});
ctx.strokeStyle=’#44ff88’;ctx.lineWidth=3;ctx.stroke();
// Dots
pts.forEach(function(p){ctx.beginPath();ctx.arc(p.x,p.y,5,0,Math.PI*2);ctx.fillStyle=’#44ff88’;ctx.fill();});
}

// ==================== SETTINGS ====================
function renderSettings(){
var el=document.getElementById(‘screen-settings’);
var h=’<div class="tag">APP</div><div class="title">Settings</div>’;
h+=’<div class="setting-item" style="text-align:center"><div class="label" style="margin-bottom:8px">ADD TO HOME SCREEN</div><div style="font-size:13px;color:#888;line-height:1.5">In Safari: tap <strong style="color:#f0f0f0">Share</strong> → <strong style="color:#f0f0f0">Add to Home Screen</strong><br>for full-screen app experience</div></div>’;
h+=’<div class="setting-item"><div class="label" style="margin-bottom:8px">START DATE</div><div style="display:flex;gap:8px;align-items:center"><input class="input" type="date" id="set-start" value="'+state.startDate+'" style="flex:1"><button class="btn btn-secondary" onclick="changeStartDate()">UPDATE</button></div></div>’;
h+=’<div class="setting-item"><div class="label" style="margin-bottom:8px">DATA</div><div style="font-size:13px;color:#888;margin-bottom:12px">’+Object.keys(state.completedDays).length+’ workouts · ‘+state.weightLog.length+’ weight entries · ‘+state.rowTimes.length+’ row times</div>’;
h+=’<div style="display:flex;gap:8px"><button class="btn btn-secondary" style="flex:1" onclick="exportData()">EXPORT</button><button class="btn btn-secondary" style="flex:1" onclick="document.getElementById(\'import-file\').click()">IMPORT</button></div><input type="file" id="import-file" accept=".json" style="display:none" onchange="importData(this)"></div>’;
h+=’<div class="setting-item"><button class="btn btn-red btn-full" onclick="resetData()">RESET ALL DATA</button></div>’;
el.innerHTML=h;
}
function changeStartDate(){var v=document.getElementById(‘set-start’).value;if(v){state.startDate=v;saveState();renderSettings();renderPlan();}}
function exportData(){
var blob=new Blob([JSON.stringify(state,null,2)],{type:‘application/json’});
var a=document.createElement(‘a’);a.href=URL.createObjectURL(blob);a.download=‘workout_backup_’+formatDate(new Date())+’.json’;a.click();
}
function importData(input){
if(!input.files||!input.files[0])return;
var reader=new FileReader();
reader.onload=function(e){
try{var d=JSON.parse(e.target.result);if(d.log!==undefined){state=d;saveState();alert(‘Data imported successfully!’);switchTab(currentTab);}}catch(err){alert(‘Invalid backup file’);}
};
reader.readAsText(input.files[0]);
}
function resetData(){
if(confirm(‘Reset ALL data? This cannot be undone.’)){if(confirm(‘Are you absolutely sure?’)){localStorage.removeItem(STORAGE_KEY);state={startDate:‘2026-03-01’,log:{},benchmarks:{squat:{},deadlift:{},bench:{},ohp:{},clean:{},pullups:{},bodyweight:{}},completedDays:{},weightLog:[],rowTimes:[]};switchTab(currentTab);}}
}

try{
loadState();
renderPlan();
}catch(e){
document.getElementById(‘screen-plan’).innerHTML=’<div style="padding:20px;color:#ff4444;font-family:monospace;word-break:break-all"><h3 style="color:#f0f0f0;font-family:Barlow Condensed,sans-serif;margin-bottom:12px">INIT ERROR</h3>’+e.message+’<br><br>’+e.stack+’</div>’;
}
